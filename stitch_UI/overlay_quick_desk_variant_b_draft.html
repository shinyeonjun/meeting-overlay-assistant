<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link as="style" crossorigin="" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "tertiary-fixed": "#e1e3e4",
            "error-container": "#93000a",
            "on-tertiary-container": "#272a2b",
            "on-error": "#690005",
            "surface-container-lowest": "#0e0e0f",
            "inverse-surface": "#e5e2e3",
            "surface-container-high": "#2a2a2b",
            "inverse-on-surface": "#303031",
            "surface-bright": "#39393a",
            "on-error-container": "#ffdad6",
            "surface-dim": "#131314",
            "background": "#131314",
            "on-tertiary-fixed-variant": "#454748",
            "error": "#ffb4ab",
            "on-surface": "#e5e2e3",
            "on-secondary-container": "#00311f",
            "on-surface-variant": "#c2c6d6",
            "tertiary-container": "#8f9192",
            "on-secondary-fixed-variant": "#005236",
            "on-primary-container": "#00285d",
            "surface-container": "#1f1f20",
            "surface-container-low": "#1b1b1c",
            "on-primary-fixed-variant": "#004395",
            "surface-tint": "#adc6ff",
            "secondary-fixed": "#6ffbbe",
            "surface": "#131314",
            "outline-variant": "#424754",
            "primary-fixed-dim": "#adc6ff",
            "on-primary": "#002e6a",
            "surface-container-highest": "#353436",
            "secondary-fixed-dim": "#4edea3",
            "tertiary-fixed-dim": "#c5c7c8",
            "primary-container": "#4d8eff",
            "secondary": "#4edea3",
            "outline": "#8c909f",
            "inverse-primary": "#005ac2",
            "on-background": "#e5e2e3",
            "surface-variant": "#353436",
            "primary": "#adc6ff",
            "on-secondary": "#003824",
            "on-primary-fixed": "#001a42",
            "on-tertiary": "#2e3132",
            "on-tertiary-fixed": "#191c1d",
            "tertiary": "#c5c7c8",
            "on-secondary-fixed": "#002113",
            "secondary-container": "#00a572",
            "primary-fixed": "#d8e2ff"
          },
          fontFamily: {
            "headline": ["Pretendard", "Inter", "sans-serif"],
            "body": ["Pretendard", "Inter", "sans-serif"],
            "label": ["Pretendard", "Inter", "sans-serif"]
          },
          borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: #0e0e0f;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
      font-size: 1.125rem;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 2px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #131314;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #353436;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
<!-- Monolith Assistant Floating Panel -->
<main class="w-[340px] h-[680px] bg-[#131314] flex flex-col shadow-[0_10px_30px_rgba(0,0,0,0.5)] overflow-hidden border border-outline-variant/20">
<!-- TopAppBar Execution -->
<header class="bg-[#131314] flex justify-between items-center w-full px-3 py-2 border-b border-outline-variant/10">
<div class="text-xs font-black tracking-[0.2em] text-[#adc6ff] font-headline uppercase">
        MONOLITH ASSISTANT
      </div>
<div class="flex gap-1">
<button class="text-[#c2c6d6] hover:bg-[#353436] transition-colors p-1 active:scale-95 duration-75">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="text-[#c2c6d6] hover:bg-[#353436] transition-colors p-1 active:scale-95 duration-75">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<!-- 1. Tiny Top Live Status Strip -->
<section class="bg-surface-container-lowest px-3 py-1.5 flex items-center gap-2 border-b border-outline-variant/10">
<div class="w-1.5 h-1.5 bg-secondary flex-shrink-0"></div>
<div class="flex items-center justify-between w-full">
<span class="text-secondary font-mono text-[10px] font-bold tracking-wider">00:12:34</span>
<span class="text-on-surface-variant text-[10px] font-medium truncate ml-2">Live Topic: 프로젝트A 주간 회의</span>
</div>
</section>
<!-- Content Area -->
<div class="flex-1 flex flex-col overflow-hidden">
<!-- 2. Dominant '열린 질문' Section (70% approximate height) -->
<section class="flex-1 px-3 pt-4 flex flex-col min-h-0">
<div class="flex items-center justify-between mb-3">
<h2 class="text-on-surface text-[11px] font-bold tracking-tight uppercase">열린 질문</h2>
<span class="text-secondary text-[10px] font-bold bg-secondary/10 px-1.5 py-0.5">5 PENDING</span>
</div>
<div class="flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-2 pb-4">
<!-- Question Card 1 -->
<div class="bg-surface-container hover:bg-surface-container-high transition-colors p-3 border-l border-secondary/50 group">
<p class="text-on-surface text-xs leading-relaxed mb-2 font-medium">다음 마일스톤 데드라인?</p>
<div class="flex items-center gap-2">
<span class="text-[9px] text-on-surface-variant uppercase tracking-tighter">Action Required</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<button class="text-primary text-[10px] font-bold opacity-0 group-hover:opacity-100 transition-opacity">ADDRESS</button>
</div>
</div>
<!-- Question Card 2 -->
<div class="bg-surface-container hover:bg-surface-container-high transition-colors p-3 border-l border-outline-variant group">
<p class="text-on-surface text-xs leading-relaxed mb-2 font-medium">리소스 배정 변경 사항?</p>
<div class="flex items-center gap-2">
<span class="text-[9px] text-on-surface-variant uppercase tracking-tighter">Strategic</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<button class="text-primary text-[10px] font-bold opacity-0 group-hover:opacity-100 transition-opacity">ADDRESS</button>
</div>
</div>
<!-- Question Card 3 -->
<div class="bg-surface-container hover:bg-surface-container-high transition-colors p-3 border-l border-outline-variant group">
<p class="text-on-surface text-xs leading-relaxed mb-2 font-medium">QA 단계 일정 확인 부탁드려요</p>
<div class="flex items-center gap-2">
<span class="text-[9px] text-on-surface-variant uppercase tracking-tighter">Timeline</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<button class="text-primary text-[10px] font-bold opacity-0 group-hover:opacity-100 transition-opacity">ADDRESS</button>
</div>
</div>
<!-- Question Card 4 -->
<div class="bg-surface-container hover:bg-surface-container-high transition-colors p-3 border-l border-outline-variant group">
<p class="text-on-surface text-xs leading-relaxed mb-2 font-medium">백엔드 API 명세 업데이트 여부?</p>
<div class="flex items-center gap-2">
<span class="text-[9px] text-on-surface-variant uppercase tracking-tighter">Technical</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<button class="text-primary text-[10px] font-bold opacity-0 group-hover:opacity-100 transition-opacity">ADDRESS</button>
</div>
</div>
<!-- Question Card 5 -->
<div class="bg-surface-container hover:bg-surface-container-high transition-colors p-3 border-l border-outline-variant group">
<p class="text-on-surface text-xs leading-relaxed mb-2 font-medium">추가 인력 충원 계획은 어떻게 되나요?</p>
<div class="flex items-center gap-2">
<span class="text-[9px] text-on-surface-variant uppercase tracking-tighter">Budget</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<button class="text-primary text-[10px] font-bold opacity-0 group-hover:opacity-100 transition-opacity">ADDRESS</button>
</div>
</div>
</div>
</section>
<!-- 3. Tiny '방금 나온 질문' Section -->
<section class="px-3 py-4 bg-surface-container-lowest border-t border-outline-variant/10">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-secondary scale-75" style="font-variation-settings: 'FILL' 1;">bolt</span>
<h2 class="text-on-surface-variant text-[10px] font-bold tracking-tight uppercase">방금 나온 질문</h2>
</div>
<div class="bg-surface-container-highest p-2.5 border border-primary/20">
<p class="text-primary text-[11px] leading-tight font-medium">예산 집행 승인 권한이 누구에게 있습니까?</p>
<div class="mt-1.5 flex justify-end">
<span class="text-[9px] text-on-surface-variant font-mono">JUST NOW</span>
</div>
</div>
</section>
</div>
<!-- 4. Bottom action row (BottomNavBar Mapping) -->
<nav class="bg-[#131314] w-full z-50 flex justify-around items-center px-1 py-2 border-t border-[#424754]/20">
<button class="flex flex-col items-center justify-center text-[#c2c6d6] p-2 hover:bg-[#1f1f20] active:scale-95 duration-100 w-1/3">
<span class="material-symbols-outlined mb-1">language</span>
<span class="font-headline text-[10px] font-bold tracking-tighter uppercase">웹</span>
</button>
<button class="flex flex-col items-center justify-center text-[#c2c6d6] p-2 hover:bg-[#1f1f20] active:scale-95 duration-100 w-1/3">
<span class="material-symbols-outlined mb-1">analytics</span>
<span class="font-headline text-[10px] font-bold tracking-tighter uppercase">리포트</span>
</button>
<button class="flex flex-col items-center justify-center text-[#adc6ff] p-2 hover:bg-[#1f1f20] active:scale-95 duration-100 w-1/3">
<span class="material-symbols-outlined mb-1 text-error">power_settings_new</span>
<span class="font-headline text-[10px] font-bold tracking-tighter uppercase">종료</span>
</button>
</nav>
</main>
<!-- Background visual context (simulating the desktop desktop environment) -->
<div class="fixed inset-0 -z-10 bg-[#0e0e0f] overflow-hidden">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary/5 rounded-full blur-[120px]"></div>
<div class="w-full h-full opacity-10 flex flex-col p-8 gap-4">
<div class="w-full h-4 bg-surface-container"></div>
<div class="w-3/4 h-4 bg-surface-container"></div>
<div class="w-full h-4 bg-surface-container"></div>
<div class="w-1/2 h-4 bg-surface-container"></div>
</div>
</div>
</body></html>
