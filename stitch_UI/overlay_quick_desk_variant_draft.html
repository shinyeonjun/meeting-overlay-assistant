<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Meeting Assistant HUD</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&amp;family=Space+Grotesk:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#690005",
              "on-error-container": "#ffdad6",
              "on-secondary-container": "#d0e1ff",
              "surface-container-low": "#1c1b1b",
              "inverse-on-surface": "#313030",
              "on-primary": "#003822",
              "tertiary-fixed-dim": "#c8c6c5",
              "surface-bright": "#393939",
              "primary": "#f6fff6",
              "error": "#ffb4ab",
              "on-tertiary-fixed": "#1c1b1b",
              "error-container": "#93000a",
              "on-tertiary-fixed-variant": "#474746",
              "on-primary-fixed": "#002112",
              "on-surface": "#e5e2e1",
              "surface": "#131313",
              "on-background": "#e5e2e1",
              "inverse-surface": "#e5e2e1",
              "on-tertiary": "#313030",
              "on-secondary-fixed-variant": "#004883",
              "on-surface-variant": "#b9cbbe",
              "surface-variant": "#353534",
              "secondary": "#a4c9ff",
              "on-secondary-fixed": "#001c39",
              "outline-variant": "#3a4a40",
              "on-primary-container": "#00714a",
              "on-secondary": "#00315d",
              "surface-container-highest": "#353534",
              "surface-dim": "#131313",
              "surface-container-high": "#2a2a2a",
              "secondary-fixed-dim": "#a4c9ff",
              "primary-container": "#00ffab",
              "surface-container": "#201f1f",
              "on-tertiary-container": "#636262",
              "primary-fixed": "#4dffb2",
              "surface-container-lowest": "#0e0e0e",
              "outline": "#849589",
              "tertiary": "#fffcfb",
              "tertiary-container": "#e2dfdf",
              "primary-fixed-dim": "#00e297",
              "surface-tint": "#00e297",
              "on-primary-fixed-variant": "#005234",
              "secondary-fixed": "#d4e3ff",
              "secondary-container": "#0164b4",
              "inverse-primary": "#006c46",
              "tertiary-fixed": "#e5e2e1",
              "background": "#131313"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 20;
            font-size: 14px;
        }
        body {
            background-color: #050505; /* Simulated desktop background */
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 2px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #3a4a40;
        }
    </style>
</head>
<body class="font-body text-on-surface antialiased">
<!-- Floating HUD Sidecar -->
<main class="w-[300px] h-[600px] bg-surface border border-outline-variant/20 flex flex-col relative">
<!-- TopAppBar Predicted Component -->
<header class="fixed top-0 w-[300px] border-b border-[#3a4a40]/20 bg-[#131313] dark:bg-[#0e0e0e] flex justify-between items-center px-3 py-2 z-50">
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 bg-primary-container rounded-full animate-pulse"></span>
<span class="font-headline text-[0.6875rem] tracking-tight uppercase text-primary-container">LIVE</span>
</div>
<div class="flex gap-3">
<span class="font-headline text-[0.6875rem] tracking-tight uppercase text-primary-container">00:00:00</span>
<span class="font-headline text-[0.6875rem] tracking-tight uppercase text-on-surface-variant">회의 주제</span>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:bg-[#2a2a2a] transition-colors duration-150 p-0.5">more_vert</span>
</div>
</header>
<!-- Main Content Canvas: Zero-Distraction Utility -->
<section class="flex-grow pt-12 pb-16 px-4 custom-scrollbar overflow-y-auto">
<!-- HUD Telemetry Header -->
<div class="mb-8 mt-4">
<div class="flex justify-between items-end mb-1">
<h2 class="font-headline text-[0.75rem] text-primary uppercase tracking-widest">Active Analysis</h2>
<span class="text-[0.6rem] text-secondary font-mono">ID: MTG-0924</span>
</div>
<div class="h-[1px] w-full bg-surface-container-highest">
<div class="h-full w-1/3 bg-primary-fixed-dim"></div>
</div>
</div>
<!-- Question Section (The "Main Section") -->
<div class="space-y-6">
<div class="group">
<label class="text-[0.6rem] uppercase tracking-tighter text-on-surface-variant mb-2 block font-medium">Pending Question 01</label>
<div class="bg-surface-container-low p-3 border-l border-primary-container transition-all hover:bg-surface-container-high cursor-default">
<p class="text-[0.8rem] leading-relaxed text-primary">향후 일정은 어떻게 되나요?</p>
</div>
</div>
<div class="group">
<label class="text-[0.6rem] uppercase tracking-tighter text-on-surface-variant mb-2 block font-medium">Pending Question 02</label>
<div class="bg-surface-container-low p-3 border-l border-outline-variant/40 transition-all hover:bg-surface-container-high cursor-default">
<p class="text-[0.8rem] leading-relaxed text-on-surface">예산 범위를 알 수 있을까요?</p>
</div>
</div>
</div>
<!-- Empty Space Padding for HUD Aesthetic -->
<div class="h-24"></div>
<!-- Tiny Secondary Line (SideNav Header subtext logic) -->
<div class="flex items-center gap-2 px-1">
<span class="w-1 h-1 bg-secondary rounded-full"></span>
<p class="text-[0.6875rem] font-body text-on-surface-variant">실시간 분석 중</p>
</div>
</section>
<!-- Footer Predicted Component -->
<footer class="fixed bottom-0 w-[300px] border-t border-[#3a4a40]/20 bg-[#131313] dark:bg-[#0e0e0e] flex justify-around items-center h-10 px-2 z-50">
<button class="flex items-center gap-1.5 py-1 px-3 text-[0.6875rem] font-body text-on-surface-variant hover:text-primary-container transition-opacity opacity-80 hover:opacity-100">
<span class="material-symbols-outlined">content_copy</span>
<span>스크립트 복사</span>
</button>
<div class="w-[1px] h-3 bg-outline-variant/20"></div>
<button class="flex items-center gap-1.5 py-1 px-3 text-[0.6875rem] font-body text-on-surface-variant hover:text-error transition-opacity opacity-80 hover:opacity-100">
<span class="material-symbols-outlined">logout</span>
<span>종료</span>
</button>
</footer>
<!-- HUD Edge Accent -->
<div class="absolute right-0 top-0 h-full w-[1px] bg-outline-variant/10"></div>
</main>
<!-- Visual Decoration for Context (Mock Desktop Element) -->
<div class="hidden lg:block fixed left-10 top-1/2 -translate-y-1/2 opacity-20 pointer-events-none">
<div class="text-[10rem] font-black text-white/5 select-none leading-none">HUD</div>
</div>
</body></html>
